# Levanta la API junto a MongoDB con un solo comando: docker compose up --build
services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      DB_DRIVER: "mongo"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "productsdb"
      MONGO_COLLECTION: "products"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
